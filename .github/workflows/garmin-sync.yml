name: garmin-sync

# Decoupled daily health sync. Pulls a trailing window from Garmin Connect and
# POSTs it to the app's ingest endpoint. Independent of the app's build/test;
# a failure here NEVER corrupts app data (the app serves the last stored data).
#
# Runs mid-morning Brazil time (UTC-3) so the prior night's sleep/HRV/readiness
# are finalized before the fetch. Also runnable on demand.

on:
  schedule:
    - cron: "0 12 * * *" # 12:00 UTC = 09:00 America/Sao_Paulo
  workflow_dispatch:

# Never overlap runs (repeated logins are the main lockout trigger).
concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r services/garmin-sync/requirements.txt
      - name: Restore cached Garmin token
        # The token dir (produced by the one-time local login, see the README) is
        # stored as a base64 tar in the GARMIN_TOKEN_B64 secret and restored here
        # so the run is unattended (no MFA). Absent on first setup — the run then
        # fails loudly until the secret is seeded.
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
        run: |
          if [ -z "$GARMIN_TOKEN_B64" ]; then
            echo "GARMIN_TOKEN_B64 secret is not set — see services/garmin-sync/README.md" >&2
            exit 1
          fi
          mkdir -p "$HOME/.garminconnect"
          echo "$GARMIN_TOKEN_B64" | base64 -d | tar -xz -C "$HOME/.garminconnect"
      - name: Sync
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          HEALTH_INGEST_SECRET: ${{ secrets.HEALTH_INGEST_SECRET }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          SYNC_DAYS: "5"
        run: python services/garmin-sync/sync.py
